    <style>
        .furniture-hero {
            --furniture-box-width: 60px;
            --furniture-box-height: 55px;
            --furniture-panel-width: min(64.5%, 700px);
            --furniture-left-cluster-left: 0px;
            position: relative;
            display: flex;
            align-items: stretch;
            justify-content: flex-start;
            height: clamp(320px, 35vw, 405px);
            min-height: 320px;
            padding: 0;
            background: #ffffff;
            overflow: hidden;
            isolation: isolate;
        }

        .furniture-hero__image {
            position: absolute;
            inset: 0;
            background-image: url('uploads/furniture-banner.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        .furniture-hero__panel {
            position: relative;
            z-index: 1;
            width: var(--furniture-panel-width);
            min-width: 535px;
            background: #f3f3f3;
            clip-path: polygon(0 0, 79% 0, 100% 100%, 0 100%);
            display: flex;
            align-items: center;
            padding: 28px 116px 28px 112px;
        }

        .furniture-hero__content {
            position: relative;
            z-index: 2;
            transform: translate(48px, 24px);
        }

        .furniture-hero__content h1 {
            margin: 0;
            color: #0c1118;
            font-size: 55px;
            font-family: 'Lato', sans-serif;
            font-weight: 720;
            line-height: 0.95;
            letter-spacing: -0.03em;
        }

        .furniture-hero__box {
            position: absolute;
            z-index: 2;
            width: var(--furniture-box-width);
            height: var(--furniture-box-height);
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .furniture-hero__box--top-a {
            top: 0;
            left: var(--furniture-left-cluster-left);
        }

        .furniture-hero__box--top-b {
            top: 0;
            left: calc(var(--furniture-left-cluster-left) + var(--furniture-box-width));
        }

        .furniture-hero__box--top-c {
            top: var(--furniture-box-height);
            left: var(--furniture-left-cluster-left);
        }

        .furniture-hero__box--top-d {
            top: calc(var(--furniture-box-height) * 2);
            left: calc(var(--furniture-left-cluster-left) + var(--furniture-box-width));
        }

        .furniture-hero__box--bottom-a {
            bottom: 0;
            left: calc(var(--furniture-panel-width) - 196px);
        }

        .furniture-hero__box--bottom-b {
            bottom: var(--furniture-box-height);
            left: calc(var(--furniture-panel-width) - 132px);
        }

        .furniture-hero__box--bottom-c {
            bottom: 0;
            left: calc(var(--furniture-panel-width) - 68px);
        }

        .furniture-hero__box--bottom-d {
            bottom: 0;
            left: calc(var(--furniture-panel-width) - 68px + var(--furniture-box-width));
        }

        .furniture-hero__box--image-top-a {
            top: 0;
            right: 132px;
        }

        .furniture-hero__box--image-top-b {
            top: var(--furniture-box-height);
            right: 68px;
        }

        @media (max-width: 768px) {
            .furniture-hero {
                --furniture-panel-width: 87%;
                min-height: 345px;
                height: auto;
            }

            .furniture-hero__panel {
                min-width: 0;
                padding: 68px 58px 34px 64px;
                clip-path: polygon(0 0, 84% 0, 100% 100%, 0 100%);
            }

            .furniture-hero__content h1 {
                font-size: clamp(1.8rem, 8vw, 2.5rem);
            }

            .furniture-hero__box--bottom-a {
                left: calc(var(--furniture-panel-width) - 184px);
            }

            .furniture-hero__box--bottom-b {
                left: calc(var(--furniture-panel-width) - 120px);
            }

            .furniture-hero__box--bottom-c {
                left: calc(var(--furniture-panel-width) - 56px);
            }

            .furniture-hero__box--bottom-d {
                left: calc(var(--furniture-panel-width) - 104px + var(--furniture-box-width));
            }

            .furniture-hero__box--image-top-a {
                right: 104px;
            }

            .furniture-hero__box--image-top-b {
                right: 40px;
            }
        }

        @media (max-width: 480px) {
            .furniture-hero {
                --furniture-panel-width: 89%;
                min-height: 305px;
            }

            .furniture-hero__panel {
                padding: 60px 44px 26px 40px;
            }

            .furniture-hero__box--top-b {
                left: calc(var(--furniture-left-cluster-left) + var(--furniture-box-width));
            }

            .furniture-hero__box--top-c {
                top: var(--furniture-box-height);
            }

            .furniture-hero__box--top-d {
                top: calc(var(--furniture-box-height) * 2);
            }

            .furniture-hero__box--bottom-a {
                left: calc(var(--furniture-panel-width) - 172px);
            }

            .furniture-hero__box--bottom-b {
                left: calc(var(--furniture-panel-width) - 108px);
            }

            .furniture-hero__box--bottom-c {
                left: calc(var(--furniture-panel-width) - 44px);
            }

            .furniture-hero__box--bottom-d {
                left: calc(var(--furniture-panel-width) - 92px + var(--furniture-box-width));
            }

            .furniture-hero__box--image-top-a {
                right: 74px;
            }

            .furniture-hero__box--image-top-b {
                right: 10px;
            }
        }
    </style>
</head>
